<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Portofolio Kelas 5</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#f6f3ff;
    }

    header{
      text-align:center;
      padding:25px;
      background:#6a5acd;
      color:white;
    }

    h1{
      margin:0;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:20px;
    }

    .card{
      width:150px;
      background:white;
      border-radius:15px;
      padding:10px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100px;
      height:100px;
      border-radius:50%;
      object-fit:cover;
    }

    a{
      text-decoration:none;
      color:black;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
  <h1>⭐ Portofolio Kelas 5 ⭐</h1>
</header>

<div class="grid">

  <div class="card">
    <a href="ani.html">
      <img src="https://via.placeholder.com/100">
      <p>Ani</p>
    </a>
  </div>

  <div class="card">
    <a href="budi.html">
      <img src="https://via.placeholder.com/100">
      <p>Budi</p>
    </a>
  </div>

</div>

</body>
</html>
